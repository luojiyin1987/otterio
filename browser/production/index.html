<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#161a21">
        <title>OtterIO Browser</title>

        <link rel="icon" type="image/png" sizes="32x32" href="/otterio/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="96x96" href="/otterio/favicon-96x96.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/otterio/favicon-16x16.png">

        <script>
            // Apply persisted theme synchronously to avoid a flash of the
            // wrong theme on first paint. Falls back to system preference.
            (function () {
                try {
                    var stored = localStorage.getItem('otterio.theme');
                    var theme = stored || (
                        window.matchMedia &&
                        window.matchMedia('(prefers-color-scheme: dark)').matches
                            ? 'dark' : 'light'
                    );
                    document.documentElement.setAttribute('data-theme', theme);
                } catch (e) {
                    document.documentElement.setAttribute('data-theme', 'light');
                }
            })();
        </script>

        <link rel="stylesheet" href="/otterio/loader.css" type="text/css">
        <link rel="stylesheet" href="/otterio/index_bundle.css" type="text/css">
    </head>

    <body>
        <div class="page-load">
            <div class="pl-inner">
                <img src="/otterio/logo.png" alt="OtterIO" />
            </div>
        </div>
        <div id="root"></div>

        <script>currentUiVersion = 'OTTERIO_UI_VERSION'</script>
        <script src="/otterio/index_bundle.js"></script>
    </body>
</html>
